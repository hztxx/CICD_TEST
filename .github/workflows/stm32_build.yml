name: STM32F4 CMake 自动编译流水线
# 触发条件：推送代码、提交PR、网页手动运行
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # 新增：代码命名规范检测（前置拦截，失败直接阻断编译）
  code-style-check:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装依赖：clang-tidy、ARM GCC、CMake
        run: |
          sudo apt update
          sudo apt install -y gcc-arm-none-eabi cmake ninja-build clang-tidy

      # 生成compile_commands.json编译数据库
      - name: CMake生成编译数据库
        run: cmake --preset stm32-f4-debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: 仅校验user目录自定义C文件（自动扫描对应头文件，避开.h单独检测报错）
        run: |
          # 加括号修复find或逻辑，只取.c源文件，不单独处理h
          FILE_LIST=$(find ./user -maxdepth 2 -type f \( -name "*.c" \))
          if [ -z "$FILE_LIST" ]; then
            echo "✅ user目录无C代码，跳过规范校验"
            exit 0
          fi
          for file in $FILE_LIST; do
            echo "==== 正在校验用户代码：$file ===="
            clang-tidy -p out/build/stm32-f4-debug --warnings-as-errors "$file"
            if [ $? -ne 0 ]; then
              echo "❌ 【代码规范拦截】$file 存在命名违规，流水线终止，禁止编译固件！"
              exit 1
            fi
          done
          echo "✅ user目录全部自定义代码命名规范校验通过"

  # 编译任务依赖规范检测，规范报错则不会执行编译
  build-firmware:
    runs-on: ubuntu-latest
    needs: code-style-check
    steps:
      # 1. 拉取仓库全部源码
      - name: 拉取代码
        uses: actions/checkout@v4

      # 2. 安装Linux交叉编译环境
      - name: 安装ARM GCC、CMake、Ninja
        run: |
          sudo apt update
          sudo apt install -y gcc-arm-none-eabi cmake ninja-build

      # 3. CMake配置+完整编译（对应VSCode里all目标）
      - name: 编译固件
        run: |
          cmake --preset stm32-f4-debug
          cmake --build --preset stm32-f4-debug

      # 4. 上传编译好的hex/bin/elf固件，流水线结束可下载
      - name: 上传固件产物
        uses: actions/upload-artifact@v4
        with:
          name: STM32_F4_编译固件
          path: out/build/stm32-f4-debug/*.{elf,hex,bin}