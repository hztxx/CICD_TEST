name: STM32F4 CMake 自动编译流水线
# 触发条件：推送代码、提交PR、网页手动运行
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # 新增：代码命名规范检测（前置拦截，失败直接阻断编译）
  code-style-check:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 全局安装编译依赖
        run: |
          sudo apt update
          sudo apt install -y gcc-arm-none-eabi cmake ninja-build clang-tidy

      # 配置 + 完整构建，生成compile_commands.json
      - name: CMake构建生成编译数据库
        run: |
          cmake --preset stm32-f4-debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          cmake --build --preset stm32-f4-debug
          # 把编译数据库复制到项目根目录，规避路径查找失败
          cp out/build/stm32-f4-debug/compile_commands.json ./

      - name: 仅校验user目录自定义C文件
        run: |
          FILE_LIST=$(find ./user -maxdepth 2 -type f \( -name "*.c" \))
          if [ -z "$FILE_LIST" ]; then
            echo "✅ user目录无C代码，跳过规范校验"
            exit 0
          fi
          for file in $FILE_LIST; do
            echo "==== 正在校验用户代码：$file ===="
            # -p . 读取根目录的编译数据库
            clang-tidy -p . --warnings-as-errors "$file"
            if [ $? -ne 0 ]; then
              echo "❌ 【代码规范拦截】$file 存在命名违规，流水线终止，禁止编译固件！"
              exit 1
            fi
          done
          echo "✅ user目录全部自定义代码命名规范校验通过"

  # 编译任务依赖规范检测，规范报错则不会执行编译
  build-firmware:
    runs-on: ubuntu-latest
    needs: code-style-check
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      # 无需重复安装依赖，只做编译
      - name: 编译固件
        run: |
          cmake --preset stm32-f4-debug
          cmake --build --preset stm32-f4-debug

      - name: 上传编译好的hex/bin/elf固件
        uses: actions/upload-artifact@v4
        with:
          name: STM32_F4_编译固件
          path: out/build/stm32-f4-debug/*.{elf,hex,bin}