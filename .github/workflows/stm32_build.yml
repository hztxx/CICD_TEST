name: STM32F4 CMake 自动编译流水线

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ==================== 代码规范检测 ====================
  code-style-check:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装编译依赖
        run: |
          sudo apt update
          sudo apt install -y gcc-arm-none-eabi cmake ninja-build clang-tidy

      # 尝试恢复构建目录缓存（基于 CMake 配置文件和预设）
      - name: 恢复 CMake 构建缓存
        id: cache-build
        uses: actions/cache@v4
        with:
          path: out/build/stm32-f4-debug
          key: ${{ runner.os }}-build-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake', 'cmake/**', 'CMakePresets.json') }}

      - name: CMake 配置与构建
        run: |
          cmake --preset stm32-f4-debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          cmake --build --preset stm32-f4-debug
          # 复制编译数据库到根目录，方便 clang-tidy 使用
          cp out/build/stm32-f4-debug/compile_commands.json ./

      - name: 校验 user 目录用户代码
        shell: bash
        run: |
          error_flag=false
          file_count=0
          while IFS= read -r -d '' file; do
            file_count=$((file_count + 1))
            echo "==== 正在校验用户代码：$file ===="
            if ! clang-tidy -p . --warnings-as-errors='*' "$file"; then
              echo "❌ 【代码规范拦截】$file 存在命名违规，流水线终止！"
              error_flag=true
              break
            fi
          done < <(find ./user -maxdepth 2 -type f -name "*.c" -print0)

          if [ "$file_count" -eq 0 ]; then
            echo "✅ user目录无C代码，跳过规范校验"
          elif [ "$error_flag" = true ]; then
            exit 1
          else
            echo "✅ user目录全部自定义代码命名规范校验通过"
          fi

  # ==================== 固件编译 ====================
  build-firmware:
    runs-on: ubuntu-latest
    needs: code-style-check   # 规范通过后才编译
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装编译依赖
        run: |
          sudo apt update
          sudo apt install -y gcc-arm-none-eabi cmake ninja-build

      # 复用 code-style-check 生成的构建缓存
      - name: 恢复 CMake 构建缓存
        id: cache-build
        uses: actions/cache@v4
        with:
          path: out/build/stm32-f4-debug
          key: ${{ runner.os }}-build-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake', 'cmake/**', 'CMakePresets.json') }}

      # 仅当缓存未命中时才需要 cmake 配置（生成 Makefile），否则直接增量编译
      - name: CMake 配置（若需要）
        if: steps.cache-build.outputs.cache-hit != 'true'
        run: cmake --preset stm32-f4-debug

      - name: 编译固件
        run: cmake --build --preset stm32-f4-debug

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: STM32_F4_编译固件
          path: out/build/stm32-f4-debug/*.{elf,hex,bin}